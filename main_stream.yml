name: Global 24-7 Professional Stream Engine

on:
  workflow_dispatch: # Manual start button
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours for 24/7 uptime

jobs:
  streaming_job:
    runs-on: ubuntu-latest
    steps:
      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Execute Live Stream Engine
        run: |
          # 1. Trending Source (NASA Earth View - Global Favorite)
          SOURCE_URL="https://www.youtube.com/watch?v=21X5lGlDOfg"
          
          # 2. Extract Direct Stream URL
          DIRECT_LINK=$(yt-dlp -f "best" -g "$SOURCE_URL")
          
          # 3. YouTube RTMP Destination (Using your Secret Key)
          RTMP_TARGET="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"

          # 4. Professional Video Processing (FFmpeg)
          ffmpeg -re -stream_loop -1 -i "$DIRECT_LINK" \
          -filter_complex \
          "[0:v]scale=1280:720, \
           hue=s=1.2:b=0.1, \
           vignette=PI/4, \
           drawtext=text='WELCOME TO CANADA':x=50:y=50:fontsize=45:fontcolor=white:borderw=2:bordercolor=red:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf, \
           drawtext=text='GLOBAL TRENDING LIVE':x=w-tw-50:y=50:fontsize=45:fontcolor=yellow:borderw=2:bordercolor=black:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf, \
           drawtext=text='BEAUTIFUL MEMORIES':x=(w-tw)/2:y=h-th-100:fontsize=45:fontcolor=cyan:borderw=2:bordercolor=black:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf, \
           drawtext=text='LIKE & SUBSCRIBE':x=w-tw-50:y=h-th-50:fontsize=40:fontcolor=white:box=1:boxcolor=red@0.8:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf[v]" \
          -map "[v]" -map 0:a \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "$RTMP_TARGET"
