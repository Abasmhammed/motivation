name: Hockey 24-7 Stream - Fixed Download

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core python3-pip
          pip3 install --break-system-packages yt-dlp

      - name: Download Hockey Classic
        run: |
          yt-dlp --user-agent "Mozilla/5.0" -f 'best[height<=720]' \
                 "https://archive.org/details/1962-stanley-cup-finals-g-6_202308" \
                 --output "hockey.%(ext)s" --no-playlist
          
          HOCKEY_FILE=$(ls -S hockey.* | head -1)
          mv "$HOCKEY_FILE" hockey.mp4
          
          SIZE=$(stat -c%s hockey.mp4)
          if [ ! -f hockey.mp4 ] || [ $SIZE -lt 100000000 ]; then 
            echo "Failed: size $SIZE"; ls -la hockey.*; exit 1
          fi
          echo "Success: $(du -h hockey.mp4) - Duration: $(ffprobe -v quiet -show_entries format=duration -of csv=p=0 hockey.mp4)s"

      - name: Stream to YouTube
        run: |
          RTMP_TARGET="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
          ffmpeg -re -stream_loop -1 -i hockey.mp4 \
          -vf "scale=1280:720,drawtext=text='24/7 CANADIAN HOCKEY CLASSICS':fontsize=35:fontcolor=red:y=20:x=50,drawtext=text='%{localtime\:%H\:%M}':fontsize=30:fontcolor=yellow:y=20:x=(w-text_w-50),drawtext=text='SUBSCRIBE 🏒':fontsize=30:fontcolor=white:y=h-th-20:x=(w-text_w)/2" \
          -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p -r 30 \
          -c:a aac -b:a 128k -f flv "$RTMP_TARGET"
