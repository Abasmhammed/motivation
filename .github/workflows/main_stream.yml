name: Vintage Screen Classics - FIXED 24/7 Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Media Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core wget

      - name: Download 4 Verified Videos
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               --tries=3 --timeout=30 -O olympics.mp4 \
               "https://dn710702.ca.archive.org/0/items/2010_Vancouver_Olympics/Alpine%20Skiing/Downhill/2010.Winter.Olympics.Alpine.Skiing.Men%27s.Downhill.SD.ENG.mp4" || echo "Olympics backup"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=3 --timeout=30 -O roscoe.mp4 \
               "https://dn721900.ca.archive.org/0/items/radio-free-roscoe-2003-06/Radio%20Free%20Roscoe%20_%20S1%20_%20EP%2003%20-%20youtuber%20encore%2B.mp4"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=3 --timeout=30 -O duesouth.mp4 \
               "https://ia601504.us.archive.org/31/items/due-south-1994-98/Due%20South%20%281994–98%29%20CA%20crime%20comedy-drama%20-%2060%20of%2067/Due%20South%20%281994%29%20S01E00%20Due%20South%20Season%2001%20Episode%2000%20Pilot%20%5BFull%20Length%5D%20-%202%20hrs.mp4"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=3 --timeout=30 -O hockey.mp4 \
               "https://dn721600.ca.archive.org/0/items/canada-vs.-usa-full-game-2019-iihf-ice-hockey-world-championship/Canada%20vs.%20USA%20_%20Full%20Game%20_%202019%20IIHF%20Ice%20Hockey%20World%20Championship.mp4"
          
          ls -lh *.mp4

      - name: 24/7 Seamless Loop Stream
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          # Playlist زي الكود القديم
          echo "file 'olympics.mp4'" > list.txt
          echo "file 'roscoe.mp4'" >> list.txt  
          echo "file 'duesouth.mp4'" >> list.txt
          echo "file 'hockey.mp4'" >> list.txt

          ffmpeg -stream_loop -1 -f concat -safe 0 -i list.txt \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=25,\
                 drawbox=y=0:color=#0f0f23@0.95:width=iw:height=85,\
                 drawtext=text='VINTAGE SCREEN CLASSICS':x=60:y=25:fontsize=38:fontcolor=#00d4ff:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,\
                 drawtext=text='%{localtime\:%H\\:%M} | 24/7 CANADIAN CLASSICS LIVE':x=(w-text_w-60):y=28:fontsize=24:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,\
                 drawbox=y=h-110:color=#1e3a8a@0.9:width=iw:height=105,\
                 drawtext=text='OLYMPIA SKIING → ROSCOE → DUE SOUTH → CANADA vs USA HOCKEY':x=60:y=(h-85):fontsize=26:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,\
                 drawtext=text='SUBSCRIBE LIVE 24/7! #VintageHockey':x=(w-text_w)/2:y=(h-50):fontsize=28:fontcolor=#00d4ff:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf" \
            -c:v libx264 -preset ultrafast -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -pix_fmt yuv420p -r 25 -g 50 -sc_threshold 0 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "$RTMP_TARGET"
