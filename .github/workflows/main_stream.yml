name: Non-Stop 24/7 Vintage Stream (Guaranteed Continuity)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/22 * * * *'

jobs:
  continuous_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 19

    steps:
      - name: Install Streaming Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl -qq

      - name: Download High-Quality Content
        run: |
          echo "Downloading verified working files..."

          # Confirmed working files from previous successful runs
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -H "Referer: https://archive.org" -o v1.mp4 "https://ia800706.us.archive.org/5/items/MakeMine1948/MakeMine1948.mp4"

          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -o v2.mp4 "https://archive.org/download/Technico1949/Technico1949.mp4"

          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -o v3.mp4 "https://dn710702.ca.archive.org/0/items/CapnCrunchCereal1960s-70s/1965%20Cap%27n%20Crunch%27s%20Sweet%20Tooth.mp4"

          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -o audio.mp3 "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_00_bennett_128kb.mp3"

          echo "Content verified:"
          ls -lh v*.mp4 audio.mp3 2>/dev/null || echo "Download check"

      - name: Professional 24/7 Live Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Content selection (priority order)
          CONTENT_FILE=""
          for file in v1.mp4 v2.mp4 v3.mp4 audio.mp3; do
            if [ -f "$file" ] && ffprobe "$file" >/dev/null 2>&1; then
              CONTENT_FILE="$file"
              break
            fi
          done

          if [ -z "$CONTENT_FILE" ]; then
            echo "ERROR: No valid content files"
            exit 1
          fi

          duration=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 "$CONTENT_FILE" 2>/dev/null || echo "unknown")
          echo "🎬 Streaming: $(basename $CONTENT_FILE)"
          echo "📏 Duration: ${duration}s"
          echo "🔴 Starting continuous broadcast..."

          # Optimized streaming pipeline for maximum reliability
          if [[ $CONTENT_FILE == *.mp3 ]]; then
            # Audio to video with professional black background
            ffmpeg -stream_loop -1 -i "$CONTENT_FILE" \
                   -f lavfi -i color=#0f1419:size=1280x720:rate=30 \
                   -c:v libx264 -preset superfast -tune zerolatency -threads 2 \
                   -b:v 1800k -maxrate 2200k -bufsize 3500k \
                   -g 48 -keyint_min 24 -sc_threshold 0 \
                   -pix_fmt yuv420p -c:a aac -b:a 112k -ar 44100 -ac 2 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          else
            # Direct HD video streaming
            ffmpeg -re -stream_loop -1 -i "$CONTENT_FILE" \
                   -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:#0f1419" \
                   -c:v libx264 -preset superfast -tune zerolatency -threads 2 \
                   -b:v 1800k -maxrate 2200k -bufsize 3500k \
                   -g 48 -keyint_min 24 -sc_threshold 0 \
                   -pix_fmt yuv420p -c:a aac -b:a 112k -ar 44100 -ac 2 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          fi
