name: Guaranteed Working Music Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: docker://linuxserver/ffmpeg:5.1-cli
      - name: Download & Stream
        env:
          RTMP: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # ONE PROVEN WORKING LINK ONLY
          ffmpeg -stream_loop -1 \
            -i "https://archive.org/download/d51753dc-f54b-4964-a32a-5aee2a693d68/WHS%20Alumni%20Hockey%20Game%201%201994.mp4" \
            -vf "scale=1280:720,
                 drawbox=y=0:color=black@0.85:h=80,
                 drawtext=text='HOCKEY 24/7':x=50:y=15:fontsize=36:fontcolor=yellow,
                 drawtext=text='%{localtime\:%H:%M} LIVE':x=w-tw-50:y=20:fontsize=28:fontcolor=white,
                 drawbox=y=h-80:color=red@0.8:h=80,
                 drawtext=text='SUBSCRIBE':x=(w-text_w)/2:y=h-35:fontsize=32:fontcolor=yellow" \
            -c:v libx264 -preset veryfast -b:v 2500k \
            -c:a copy -f flv "rtmp://a.rtmp.youtube.com/live2/$RTMP"
