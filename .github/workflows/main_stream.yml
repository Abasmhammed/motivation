name: Vintage Jazz - GUARANTEED Working

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  jazz_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download 4 Jazz Songs
        run: |
          wget -O tipperary.mp3 "https://dn720708.ca.archive.org/0/items/its-a-long-long-way-to-tipperary/It%27s%20a%20Long%2C%20Long%20Way%20to%20Tipperary.mp3"
          wget -O dancing.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/ABoyAndAGirlWereDancing.mp3"
          wget -O twilight.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AtTwilight.mp3"
          wget -O happiness.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AllForYou-Happiness.mp3"

      - name: Create Jazz Background + Videos + Stream
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          # 1. Create professional jazz background
          ffmpeg -f lavfi -i color=#0f0f23:1280x720:duration=60 -vf "drawbox=y=80:h=10:c=#FFD700,
          drawtext=text='1920s JAZZ GOLDEN ERA':fontsize=48:c=#FFD700:x=(w-text_w)/2:y=20,
          drawtext=text='Paul Whiteman Classics':fontsize=36:c=white:x=(w-text_w)/2:y=140,
          drawtext=text='24/7 Live | %{localtime\:%H:%M}':fontsize=30:c=#00d4ff:x=(w-text_w)/2:y=650" jazz_bg.mp4

          # 2. Create 4 videos
          for song in tipperary dancing twilight happiness; do
            ffmpeg -stream_loop -1 -i jazz_bg.mp4 -i ${song}.mp3 -c:v libx264 -preset ultrafast -b:v 2000k -pix_fmt yuv420p -c:a aac -b:a 128k -shortest ${song}_video.mp4
          done

          # 3. Infinite YouTube stream
          echo "file 'tipperary_video.mp4'" > playlist.txt
          echo "file 'dancing_video.mp4'" >> playlist.txt
          echo "file 'twilight_video.mp4'" >> playlist.txt
          echo "file 'happiness_video.mp4'" >> playlist.txt

          ffmpeg -stream_loop -1 -f concat -safe 0 -i playlist.txt -c:v libx264 -preset ultrafast -b:v 2000k -pix_fmt yuv420p -c:a aac -b:a 128k -f flv "$RTMP_TARGET"
