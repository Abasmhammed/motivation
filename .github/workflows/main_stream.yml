name: Beautiful Days Vintage 24/7 (Archive Pro - Full Mode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  vintage_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget curl jq

      - name: Pro Download (Archive.org + Headers + Fallbacks)
        continue-on-error: true
        run: |
          echo "=== Archive.org Pro Download (14 files) ==="

          # Pro function with validation - SKIPS failed links automatically
          download_pro() {
            local url="$1" output="$2"
            echo "Trying: $url -> $output"
            
            # Primary CDN
            curl -L -s -m 60 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -H "Referer: https://archive.org" -o "$output.tmp" "$url" &&
            local size=$(stat -c%s "$output.tmp" 2>/dev/null || echo 0)
            if [ $size -gt 50000 ]; then
              mv "$output.tmp" "$output"
              echo "✅ $output OK ($size bytes)"
              return 0
            else
              rm -f "$output.tmp"
              echo "❌ $output FAILED (too small) - SKIPPED"
              return 1
            fi
          }

          # 14 PRO links (v1.mp4 REMOVED)
          download_pro "https://ia800706.us.archive.org/5/items/MakeMine1948/MakeMine1948.mp4" v2.mp4
          download_pro "https://archive.org/download/CapnCrunchCereal1960s-70s/CapnCrunchCereal1960s-70s.mp4" v3.mp4
          download_pro "https://dn710702.ca.archive.org/0/items/CapnCrunchCereal1960s-70s/1965%20Cap%27n%20Crunch%27s%20Sweet%20Tooth.mp4" v4.mp4
          download_pro "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_00_bennett_128kb.mp3" v5.mp3
          download_pro "https://archive.org/download/1938TheTinNoseShop/1938TheTinNoseShop_512kb.mp4" v6.mp4
          download_pro "https://ia802606.us.archive.org/33/items/1940sShortFilm/1940sShortFilm_512kb.mp4" v7.mp4
          download_pro "https://archive.org/download/1949publicdomainanimation/1949_512kb.mp4" v8.mp4
          download_pro "https://ia601204.us.archive.org/17/items/1938TheTinNoseShop/1938TheTinNoseShop.mp4" v9.mp4
          download_pro "https://archive.org/download/ThatTinNoseShop1938/ThatTinNoseShop1938_512kb.mp4" v10.mp4
          download_pro "https://archive.org/download/vintagelooneytunes/1940sBugsBunny.mp4" v11.mp4
          download_pro "https://ia800104.us.archive.org/0/items/1940sPublicDomain/1940sShortFilm.mp4" v12.mp4
          download_pro "https://archive.org/download/oldcartoons1940s/1940sCartoonCollection.mp4" v13.mp4
          download_pro "https://dn790000.ca.archive.org/0/items/MakeMineMusic1946/MakeMineMusic1946.mp4" v14.mp4
          download_pro "https://archive.org/download/publicdomainshorts/1950sPublicDomainShort.mp4" v15.mp4

          echo "=== FINAL REPORT ==="
          VALID_FILES=$(ls -1 v*.mp4 v*.mp3 2>/dev/null | xargs -I {} sh -c '[ $(stat -c%s "{}" 2>/dev/null || echo 0) -gt 50000 ] && echo {}')
          echo "$VALID_FILES" | wc -l | xargs echo "✅ Valid files count:"
          echo "$VALID_FILES"

      - name: 24/7 YouTube Live Stream (Pro)
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Select best file (longest duration priority)
          BEST_FILE=""
          MAX_DURATION=0
          
          for file in v*.mp4 v*.mp3; do
            [ ! -f "$file" ] && continue
            duration=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 "$file" 2>/dev/null || echo 0)
            size=$(stat -c%s "$file" 2>/dev/null || echo 0)
            if [ $size -gt 50000 ] && [ $(echo "$duration > $MAX_DURATION" | bc -l 2>/dev/null || echo 0) -eq 1 ]; then
              BEST_FILE="$file"
              MAX_DURATION="$duration"
            fi
          done
          
          if [ -z "$BEST_FILE" ]; then
            echo "❌ No valid files for streaming!"
            exit 1
          fi

          echo "🎬 Streaming BEST: $BEST_FILE (duration: ${MAX_DURATION}s, size: $(du -h $BEST_FILE | cut -f1))"

          if [[ $BEST_FILE == *.mp3 ]]; then
            # Audio to Video (black bg + infinite loop)
            ffmpeg -stream_loop -1 -i "$BEST_FILE" \
                   -f lavfi -i color=black:size=1280x720:rate=30 \
                   -shortest -vf "scale=1280:720" \
                   -c:v libx264 -preset ultrafast -tune zerolatency -b:v 1500k \
                   -g 50 -keyint_min 25 -pix_fmt yuv420p \
                   -c:a aac -b:a 128k -ar 44100 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          else
            # Video infinite loop
            ffmpeg -re -stream_loop -1 -i "$BEST_FILE" \
                   -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:black" \
                   -c:v libx264 -preset ultrafast -tune zerolatency \
                   -b:v 1500k -maxrate 2000k -bufsize 3000k \
                   -g 50 -keyint_min 25 -sc_threshold 0 -pix_fmt yuv420p \
                   -c:a aac -b:a 128k -ar 44100 -ac 2 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          fi
