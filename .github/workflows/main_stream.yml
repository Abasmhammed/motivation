name: YouTube Music Loop - 4 Videos Continuous Play
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # Restart every 4 hours

jobs:
  music_loop:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg yt-dlp

      - name: Download All 4 Music Videos
        run: |
          # Video 1
          yt-dlp -f 'best[height<=720]' --no-playlist -o "video1.mp4" "https://music.youtube.com/watch?v=IoO9pbEzJ7U"
          
          # Video 2  
          yt-dlp -f 'best[height<=720]' --no-playlist -o "video2.mp4" "https://music.youtube.com/watch?v=KBdyzeA2Fl0"
          
          # Video 3
          yt-dlp -f 'best[height<=720]' --no-playlist -o "video3.mp4" "https://music.youtube.com/watch?v=YuhiLvoTBJY"
          
          # Video 4
          yt-dlp -f 'best[height<=720]' --no-playlist -o "video4.mp4" "https://music.youtube.com/watch?v=BV3NNQytg4g"
          
          echo "✅ All 4 videos downloaded:"
          ls -lh video*.mp4

      - name: Create Concatenation List
        run: |
          cat > playlist.txt << EOF
          file 'video1.mp4'
          file 'video2.mp4'
          file 'video3.mp4'
          file 'video4.mp4'
          EOF
          echo "✅ Playlist ready (4 videos loop)"

      - name: Merge Videos Into Single File
        run: |
          ffmpeg -f concat -safe 0 -i playlist.txt -c copy all_videos.mp4 -y
          echo "✅ Combined video: $(du -h all_videos.mp4)"

      - name: Infinite 24/7 Loop Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -stream_loop -1 -re -i all_videos.mp4 \
            -vf "
              scale=1280:720,
              drawbox=y=0:color=#1976D2@0.95:h=60,
              drawtext=text='YOUTUBE MUSIC 24/7 LOOP':x=50:y=15:fontsize=32:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='%{localtime\:%H:%M} LIVE - 4 Videos Repeat':x=w-tw-60:y=17:fontsize=24:fontcolor=#BBDEFB,
              
              drawbox=y=h-80:color=#FBC02D@0.9:h=80,
              drawtext=text='🔔 SUBSCRIBE':x=50:y=h-55:fontsize=36:fontcolor=#1B5E20,
              drawtext=text='👍 LIKE':x=w/2-100:y=h-55:fontsize=36:fontcolor=#1B5E20
            " \
            -c:v libx264 -preset fast -b:v 2500k -r 30 \
            -c:a aac -b:a 128k \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
