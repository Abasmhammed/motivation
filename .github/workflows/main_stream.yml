name: Beautiful Days Vintage 24/7 (Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  vintage_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download 7 Videos (Skip Failed)
        continue-on-error: true
        run: |
          echo "Downloading 7 vintage videos..."

          # 7 روابط مضمونة مع skip
          wget --timeout=30 --tries=3 -q -O v1.mp4 "https://archive.org/download/Technico1949/Technico1949.mp4" || true
          wget --timeout=30 --tries=3 -q -O v2.mp4 "https://ia801605.us.archive.org/27/items/PubicDomainTheMoviepart4Conclusion/04_pubicDomain_TheMovie_part4_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v3.mp4 "https://dn790000.ca.archive.org/0/items/MakeMine1948/MakeMine1948.mp4" || true
          wget --timeout=30 --tries=3 -q -O v4.mp4 "https://archive.org/download/1938TheTinNoseShop/1938TheTinNoseShop_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v5.mp4 "https://archive.org/download/ThatTinNoseShop1938/ThatTinNoseShop1938_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v6.mp4 "https://archive.org/download/1949publicdomainanimation/1949_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v7.mp4 "https://archive.org/download/1940sShortFilm/1940sShortFilm_512kb.mp4" || true

          echo "✅ Available files:"
          ls -lh v*.mp4 2>/dev/null || echo "No files"

      - name: 🔴 Pro 24/7 Stream (Keyframes Fixed)
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # اختيار أول فيديو متوفر
          if [ -f v1.mp4 ]; then FILE=v1.mp4; 
          elif [ -f v2.mp4 ]; then FILE=v2.mp4; 
          elif [ -f v3.mp4 ]; then FILE=v3.mp4; 
          elif [ -f v4.mp4 ]; then FILE=v4.mp4; 
          elif [ -f v5.mp4 ]; then FILE=v5.mp4; 
          elif [ -f v6.mp4 ]; then FILE=v6.mp4; 
          else FILE=v7.mp4; fi

          echo "🎬 Streaming: $FILE"
          ffmpeg -re -stream_loop -1 -i "$FILE" \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -b:v 1500k -maxrate 2000k -bufsize 3000k \
            -g 50 -keyint_min 25 -sc_threshold 0 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -ar 44100 -ac 2 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
