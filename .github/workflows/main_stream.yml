name: LoFi Stream - Subscribe + Like Only
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  lofi_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download LoFi Video
        run: |
          wget -O lofi.mp4 "https://dn721605.ca.archive.org/0/items/snow-silence-winter-lo-fi-chillout-beats-2022/%E2%9D%86%20Snow%20Silence%20%E2%9D%86%20%20Winter%20Lo-fi%20%20Chillout%20%20Beats%20Music%20Mix.mp4"
          echo "Video downloaded successfully"

      - name: Start 24/7 Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -stream_loop -1 -re -i lofi.mp4 \
            -vf "
              scale=1280:720,
              drawbox=y=0:color=#1976D2@0.95:h=60,
              drawtext=text='WINTER LOFI 24/7':x=50:y=15:fontsize=32:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='%{localtime\:%H:%M} LIVE':x=w-tw-50:y=17:fontsize=24:fontcolor=#BBDEFB,
              
              drawbox=y=h-80:color=#FBC02D@0.9:h=80,
              drawtext=text='🔔 SUBSCRIBE':x=50:y=h-55:fontsize=36:fontcolor=#1B5E20:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='👍 LIKE':x=w/2-100:y=h-55:fontsize=36:fontcolor=#1B5E20:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
            " \
            -c:v libx264 -preset fast -b:v 2500k -r 30 \
            -c:a copy -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

      - name: Stream Status
        run: |
          echo "✅ LoFi 24/7 Stream is LIVE!"
          echo "📺 Check YouTube Live Control Room"
