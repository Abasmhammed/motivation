name: Working Vintage Stream (Confirmed 4 Files)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  working_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl

      - name: Download Confirmed Working Files Only
        run: |
          echo "Downloading 4 confirmed working files..."

          # These 4 WORKED in your logs
          curl -L -A "Mozilla/5.0" -o vintage1.mp4 "https://ia800706.us.archive.org/5/items/MakeMine1948/MakeMine1948.mp4"
          curl -L -A "Mozilla/5.0" -o vintage2.mp4 "https://archive.org/download/Technico1949/Technico1949.mp4"
          curl -L -A "Mozilla/5.0" -o vintage3.mp4 "https://dn710702.ca.archive.org/0/items/CapnCrunchCereal1960s-70s/1965%20Cap%27n%20Crunch%27s%20Sweet%20Tooth.mp4"
          curl -L -A "Mozilla/5.0" -o audio_preface.mp3 "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_00_bennett_128kb.mp3"

          echo "Working files:"
          ls -lh *.mp4 *.mp3

      - name: Stable 24/7 Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Pick first valid file
          FILE=""
          for f in vintage1.mp4 vintage2.mp4 vintage3.mp4 audio_preface.mp3; do
            [ -f "$f" ] && ffprobe "$f" >/dev/null 2>&1 && { FILE="$f"; break; }
          done

          echo "Streaming: $FILE"

          if [[ $FILE == *.mp3 ]]; then
            ffmpeg -stream_loop -1 -i "$FILE" \
                   -f lavfi -i color=black:1280x720 \
                   -c:v libx264 -preset ultrafast -b:v 1500k \
                   -pix_fmt yuv420p -c:a aac -b:a 96k \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          else
            ffmpeg -re -stream_loop -1 -i "$FILE" \
                   -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:black" \
                   -c:v libx264 -preset ultrafast -b:v 1500k \
                   -pix_fmt yuv420p -c:a aac \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          fi
