name: Vintage Book 24/7 Stream (English - International)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  international_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Install FFmpeg and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Download Content Files
        run: |
          echo "Downloading high-quality vintage and audiobook content..."

          # Primary audiobook (full book)
          curl -L -A "Mozilla/5.0" -H "Referer: https://archive.org" \
               -o book_full.m4b "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_1504_librivox_64kb.mp4"

          # Preface chapter backup
          curl -L -A "Mozilla/5.0" -H "Referer: https://archive.org" \
               -o book_preface.mp3 "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_00_bennett_128kb.mp3"

          # Vintage video backups
          curl -L -A "Mozilla/5.0" -o vintage1.mp4 "https://ia800706.us.archive.org/5/items/MakeMine1948/MakeMine1948.mp4" || true
          curl -L -A "Mozilla/5.0" -o vintage2.mp4 "https://archive.org/download/Technico1949/Technico1949.mp4" || true
          curl -L -A "Mozilla/5.0" -o vintage3.mp4 "https://dn710702.ca.archive.org/0/items/CapnCrunchCereal1960s-70s/1965%20Cap%27n%20Crunch%27s%20Sweet%20Tooth.mp4" || true

          echo "Content ready for streaming:"
          ls -lh *.m4b *.mp3 *.mp4 2>/dev/null | grep -v " 0 "

      - name: 24/7 Live Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Content priority (longest duration first)
          CONTENT_FILE=""
          for file in book_full.m4b vintage1.mp4 vintage2.mp4 vintage3.mp4 book_preface.mp3; do
            if [ -f "$file" ] && ffprobe "$file" >/dev/null 2>&1; then
              CONTENT_FILE="$file"
              break
            fi
          done

          if [ -z "$CONTENT_FILE" ]; then
            echo "No valid content files available"
            exit 1
          fi

          duration=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 "$CONTENT_FILE" 2>/dev/null || echo "unknown")
          echo "Selected content: $CONTENT_FILE (duration: ${duration}s)"

          # Stream configuration
          if [[ $CONTENT_FILE == *.mp3 ]]; then
            # Audio to video conversion with black background
            ffmpeg -stream_loop -1 -i "$CONTENT_FILE" \
                   -f lavfi -i color=black:size=1280x720:rate=30 \
                   -c:v libx264 -preset ultrafast -tune zerolatency \
                   -b:v 2000k -maxrate 2500k -bufsize 4000k \
                   -g 50 -keyint_min 25 -pix_fmt yuv420p \
                   -c:a aac -b:a 128k -ar 44100 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          else
            # Direct video streaming
            ffmpeg -re -stream_loop -1 -i "$CONTENT_FILE" \
                   -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:black" \
                   -c:v libx264 -preset ultrafast -tune zerolatency \
                   -b:v 2000k -maxrate 2500k -bufsize 4000k \
                   -g 50 -keyint_min 25 -sc_threshold 0 -pix_fmt yuv420p \
                   -c:a aac -b:a 128k -ar 44100 \
                   -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          fi
