name: Vintage Jazz 24/7 - SIMPLE & WORKING

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  jazz_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download 4 Paul Whiteman Songs
        run: |
          wget -q -O tipperary.mp3 "https://dn720708.ca.archive.org/0/items/its-a-long-long-way-to-tipperary/It%27s%20a%20Long%2C%20Long%20Way%20to%20Tipperary.mp3"
          wget -q -O dancing.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/ABoyAndAGirlWereDancing.mp3"
          wget -q -O twilight.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AtTwilight.mp3"
          wget -q -O happiness.mp3 "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AllForYou-Happiness.mp3"

      - name: Create & Stream 24/7 Jazz Loop
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          # Playlist: 4 songs loop
          echo "file 'tipperary.mp3'" > playlist.txt
          echo "file 'dancing.mp3'" >> playlist.txt
          echo "file 'twilight.mp3'" >> playlist.txt
          echo "file 'happiness.mp3'" >> playlist.txt

          # Stream with animated jazz background
          ffmpeg -stream_loop -1 -f concat -safe 0 -i playlist.txt \
                 -vf "drawbox=y=0:h=720:w=1280:c=black@0.3, \
                      drawbox=y=80:h=10:c=#FFD700@1, \
                      drawtext=text='VINTAGE JAZZ 1920s':fontsize=48:fontcolor=#FFD700:x=(w-text_w)/2:y=20, \
                      drawtext=text='Paul Whiteman Golden Era':fontsize=36:fontcolor=white:x=(w-text_w)/2:y=140, \
                      drawtext=text='24/7 Live Stream | %{localtime\:%H:%M}':fontsize=30:fontcolor=#00d4ff:x=(w-text_w)/2:y=650" \
                 -c:v libx264 -preset ultrafast -b:v 2000k -pix_fmt yuv420p -r 25 \
                 -c:a aac -b:a 128k \
                 -f flv "$RTMP_TARGET"
