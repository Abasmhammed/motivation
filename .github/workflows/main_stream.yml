name: Prelinger 7 Videos 24/7 Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  vintage_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download ALL 7 Videos
        run: |
          echo "Downloading 7 Prelinger videos..."
          wget --timeout=30 --tries=3 -q -O video1.mp4 "https://dn790002.ca.archive.org/0/items/Technico1949/Technico1949.mp4"
          wget --timeout=30 --tries=3 -q -O video2.mp4 "https://ia801605.us.archive.org/27/items/PubicDomainTheMoviepart4Conclusion/04_pubicDomain_TheMovie_part4_512kb.mp4"
          wget --timeout=30 --tries=3 -q -O video3.mp4 "https://dn790000.ca.archive.org/0/items/MakeMine1948/MakeMine1948.mp4"
          wget --timeout=30 --tries=3 -q -O video4.mp4 "https://dn790001.ca.archive.org/0/items/MarketStreet19064KScan20181016/MarketStreet_4K_to_2K_cropped_higher_contrast.mp4"
          wget --timeout=30 --tries=3 -q -O video5.mp4 "https://dn710206.ca.archive.org/0/items/youtube-r-JKfjKRsw0/r-JKfjKRsw0.mp4"
          wget --timeout=30 --tries=3 -q -O video6.mp4 "https://dn721804.ca.archive.org/0/items/youtube-YM5A4TamTzo/YM5A4TamTzo.mp4"
          wget --timeout=30 --tries=3 -q -O video7.mp4 "https://dn721600.ca.archive.org/0/items/youtube-ePH--widhXk/ePH--widhXk.mp4"
          echo "✅ All 7 videos ready!"
          ls -lh video*.mp4

      - name: Create 7-Video Playlist
        run: |
          cat > playlist.txt << 'EOF'
file 'video1.mp4'
file 'video2.mp4'
file 'video3.mp4'
file 'video4.mp4'
file 'video5.mp4'
file 'video6.mp4'
file 'video7.mp4'
EOF
          cat playlist.txt

      - name: Test (10 sec)
        run: |
          ffmpeg -y -stream_loop -1 -f concat -safe 0 -i playlist.txt \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,
                 drawtext=text='PRELINGER 7K':fontsize=48:fontcolor=#FFD700:x=(w-text_w)/2:y=30,
                 drawtext=text='Colorized Vintage Loop':fontsize=32:fontcolor=white:x=(w-text_w)/2:y=90,
                 drawtext=text='24/7 Live':fontsize=28:fontcolor=#00d4ff:x=(w-text_w)/2:y=650" \
            -c:v libx264 -preset ultrafast -b:v 1500k -pix_fmt yuv420p \
            -c:a aac -b:a 96k -t 10 -f null - && echo "✅ READY!"

      - name: 🔴 24/7 YouTube Stream
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          ffmpeg -re -stream_loop -1 -f concat -safe 0 -i playlist.txt \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,
                 drawtext=text='PRELINGER 7K':fontsize=48:fontcolor=#FFD700:x=(w-text_w)/2:y=30,
                 drawtext=text='Vintage Colorized':fontsize=32:fontcolor=white:x=(w-text_w)/2:y=90,
                 drawtext=text='24/7 Non-Stop Loop':fontsize=28:fontcolor=#00d4ff:x=(w-text_w)/2:y=650,
                 drawtext=text='%{localtime\:%H:%M}':fontsize=24:fontcolor=#aaffaa:x=20:y=680" \
            -c:v libx264 -preset ultrafast -tune zerolatency -b:v 1500k \
            -pix_fmt yuv420p -r 25 \
            -c:a aac -b:a 96k \
            -f flv "$RTMP_TARGET"
