name: 🎵 Winter LoFi + Motivational Quotes - Colorful Success Messages
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  motivational_lofi:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download LoFi Video
        run: |
          wget -O lofi.mp4 "https://dn721605.ca.archive.org/0/items/snow-silence-winter-lo-fi-chillout-beats-2022/%E2%9D%86%20Snow%20Silence%20%E2%9D%86%20%20Winter%20Lo-fi%20%20Chillout%20%20Beats%20Music%20Mix.mp4"
          echo "✅ LoFi video ready: $(du -h lofi.mp4)"

      - name: Professional Motivational Stream 24/7
        env:
          KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -stream_loop -1 -re -i lofi.mp4 \
            -vf "
              
              # Video preparation
              scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=30[v0];
              
              # TOP MOTIVATIONAL BAR - Electric Blue Gradient
              [v0]drawbox=y=0:color=#1976D2@0.96:width=iw:height=75[top1],
              drawbox=y=0:color=#0D47A1@0.96:width=iw:height=75[top2],
              drawtext=text='🚀 MOTIVATIONAL LOFI BEATS 24/7 🚀':x=40:y=18:fontsize=38:fontcolor=#E1F5FE:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='%{localtime\:%H:%M:%S} LIVE | Success • Focus • Productivity':x=w-tw-70:y=20:fontsize=28:fontcolor=#BBDEFB[topbar],
              
              # BOTTOM ACTION BAR - Victory Gold Gradient
              [topbar]drawbox=y=h-115:color=#FBC02D@0.93:width=iw:height=115[bottom1],
              drawbox=y=h-115:color=#F57F17@0.93:width=iw:height=115[bottom2],
              drawtext=text='🔔 SUBSCRIBE FOR DAILY MOTIVATION':x=(w-text_w)/2:y=h-90:fontsize=34:fontcolor=#1B5E20:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='💪 LIKE if motivated | 💬 Share your goals | 🛎️ Notifications ON':x=(w-text_w)/2:y=h-60:fontsize=24:fontcolor=#E65100[cta],
              
              # LARGE MOTIVATIONAL QUOTES - 12 Rainbow Colors (20s rotation)
              [cta]drawbox=x=30:y=h-380:w=1220:h=250:color=#E91E63@0.94:r=25:thickness=fill[quotebox1],
              drawbox=x=30:y=h-380:w=1220:h=250:color=#AD1457@0.94:r=25[quotebox2],
              
              # QUOTE 1 - Rose Gold (0-20s)
              drawtext=text='SUCCESS is the sum of small efforts repeated day in and day out':enable='lt(mod(t,240),20)':x=60:y=h-350:fontsize=28:fontcolor=#F8BBD9:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Robert Collier':enable='lt(mod(t,240),20)':x=60:y=h-320:fontsize=22:fontcolor=#F48FB1,
              
              # QUOTE 2 - Electric Blue (20-40s)
              drawtext=text='FOCUS on being productive instead of busy':enable='between(t,20,40)':x=60:y=h-350:fontsize=28:fontcolor=#42A5F5:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Tim Ferriss':enable='between(t,20,40)':x=60:y=h-320:fontsize=22:fontcolor=#BBDEFB,
              
              # QUOTE 3 - Victory Gold (40-60s)
              drawtext=text='HARD WORK beats talent when talent doesn\\'t work hard':enable='between(t,40,60)':x=60:y=h-350:fontsize=28:fontcolor=#FFCA28:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Tim Notke':enable='between(t,40,60)':x=60:y=h-320:fontsize=22:fontcolor=#FFF176,
              
              # QUOTE 4 - Emerald Success (60-80s)
              drawtext=text='The successful warrior is the average man with LASER focus':enable='between(t,60,80)':x=60:y=h-350:fontsize=28:fontcolor=#689F38:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Bruce Lee':enable='between(t,60,80)':x=60:y=h-320:fontsize=22:fontcolor=#C5E1A5,
              
              # QUOTE 5 - Royal Purple (80-100s)
              drawtext=text='PRODUCTIVITY is never an accident - it\\'s COMMITMENT to excellence':enable='between(t,80,100)':x=60:y=h-350:fontsize=28:fontcolor=#8E24AA:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Paul J. Meyer':enable='between(t,80,100)':x=60:y=h-320:fontsize=22:fontcolor=#E1BEE7,
              
              # QUOTE 6 - Fire Orange (100-120s)
              drawtext=text='What you do TODAY can improve ALL your tomorrows':enable='between(t,100,120)':x=60:y=h-350:fontsize=28:fontcolor=#EF6C00:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Ralph Marston':enable='between(t,100,120)':x=60:y=h-320:fontsize=22:fontcolor=#FFCCBC,
              
              # QUOTE 7 - Teal Power (120-140s)
              drawtext=text='ACTION is the foundational key to ALL success':enable='between(t,120,140)':x=60:y=h-350:fontsize=28:fontcolor=#00838F:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Pablo Picasso':enable='between(t,120,140)':x=60:y=h-320:fontsize=22:fontcolor=#B2DFDB,
              
              # QUOTE 8 - Crimson Red (140-160s)
              drawtext=text='Plans are nothing - PLANNING is EVERYTHING':enable='between(t,140,160)':x=60:y=h-350:fontsize=28:fontcolor=#D32F2F:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Dwight D. Eisenhower':enable='between(t,140,160)':x=60:y=h-320:fontsize=22:fontcolor=#FFCDD2,
              
              # QUOTE 9 - Mint Green (160-180s)
              drawtext=text='Concentrate your thoughts upon the WORK at hand':enable='between(t,160,180)':x=60:y=h-350:fontsize=28:fontcolor=#388E3C:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Alexander Graham Bell':enable='between(t,160,180)':x=60:y=h-320:fontsize=22:fontcolor=#C8E6C9,
              
              # QUOTE 10 - Sapphire Blue (180-200s)
              drawtext=text='Opportunity is missed because it looks like WORK':enable='between(t,180,200)':x=60:y=h-350:fontsize=28:fontcolor=#0277BD:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Thomas Edison':enable='between(t,180,200)':x=60:y=h-320:fontsize=22:fontcolor=#BBDEFB,
              
              # QUOTE 11 - Coral Pink (200-220s)
              drawtext=text='You don\\'t get paid for the hour - you get paid for VALUE':enable='between(t,200,220)':x=60:y=h-350:fontsize=28:fontcolor=#C2185B:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Jim Rohn':enable='between(t,200,220)':x=60:y=h-320:fontsize=22:fontcolor=#F8BBD9,
              
              # QUOTE 12 - Lime Energy (220-240s)
              drawtext=text='Productivity starts with doing the RIGHT things':enable='between(t,220,240)':x=60:y=h-350:fontsize=28:fontcolor=#7CB342:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,
              drawtext=text='- Bill Bapodagli':enable='between(t,220,240)':x=60:y=h-320:fontsize=22:fontcolor=#C5E1A5[final]"
            -map "[final]" \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -b:v 4000k -maxrate 4500k -bufsize 9000k -r 30 -g 60 \
            -pix_fmt yuv420p -c:a copy \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY"

      - name: Success Confirmation
        run: |
          echo "🎉 MOTIVATIONAL LOFI STREAM LIVE!"
          echo "✅ 12 Success Quotes - Rainbow Colors"
          echo "✅ Subscribe Bar + Live Clock"
          echo "✅ Professional 1080p 4000k Quality"
