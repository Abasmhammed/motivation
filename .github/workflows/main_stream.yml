name: Hockey 24-7 - DIRECT LINK FIXED

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  hockey_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core wget

      - name: Download DIRECT Hockey MP4
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 --timeout=60 --waitretry=10 \
               -O hockey.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/NYR%20vs%20TOR.ia.mp4"
          
          SIZE=$(stat -c%s hockey.mp4 2>/dev/null || echo 0)
          if [ $SIZE -lt 50000000 ]; then 
            echo "❌ Failed: $(du -h hockey.mp4)"; exit 1
          fi
          echo "✅ SUCCESS: $(du -h hockey.mp4)"

      - name: Verify & Stream
        run: |
          ffprobe -v quiet -show_entries format=duration -of csv=p=0 hockey.mp4
          RTMP="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
          ffmpeg -re -stream_loop -1 -i hockey.mp4 \
          -vf "scale=1280:720,drawtext=text='NHL 1962 NYR vs TOR':fontsize=35:fontcolor=red:y=25,drawtext=text='%{localtime\:%H:%M} LIVE':fontsize=30:fontcolor=yellow:y=25:x=(w-text_w-50),drawtext=text='24/7 HOCKEY 🏒':fontsize=30:fontcolor=white:y=h-text_h-25:x=(w-text_w)/2" \
          -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p -r 30 -g 60 \
          -c:a aac -b:a 128k -f flv "$RTMP"
