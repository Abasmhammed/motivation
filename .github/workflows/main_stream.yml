name: Global Cinema 24-7 Local Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  movie_streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Pro Media Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core wget unzip

      - name: Pre-Download Clearing the Range (PERFECT!)
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 --waitretry=10 \
               -O western.mp4 "https://archive.org/download/ClearingtheRange/Clearing_the_Range_512kb.mp4" || \
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o western.mp4 "https://archive.org/download/ClearingtheRange/Clearing_the_Range_512kb.mp4"
          
          if [ ! -f western.mp4 ] || [ $(stat -c%s western.mp4) -lt 5000000 ]; then
            echo "Download failed"
            exit 1
          fi
          echo "✅ Western Classic ready: $(du -h western.mp4)"

      - name: Check Video
        run: ffprobe -v quiet -show_entries format=duration -of csv=p=0 western.mp4 || exit 1

      - name: Launch 24-7 Western Stream
        run: |
          RTMP_TARGET="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
          ffmpeg -re -stream_loop -1 -i western.mp4 \
          -filter_complex "[0:v]scale=1280:720,drawbox=y=0:color=black@0.8:width=iw:height=70:t=fill,drawtext=text='CLEARING THE RANGE CLASSIC':x=50:y=20:fontsize=35:fontcolor=gold:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,drawtext=text='%{localtime\:%H\:%M\:%S} LIVE':x=w-tw-50:y=20:fontsize=30:fontcolor=yellow:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,drawbox=y=h-70:color=red@0.7:width=iw:height=70:t=fill,drawtext=text='👇 SUBSCRIBE FOR MORE WESTERNS 🎬':x=(w-tw)/2:y=h-th-20:fontsize=30:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf[v]" \
          -map "[v]" -map 0:a -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "$RTMP_TARGET"
