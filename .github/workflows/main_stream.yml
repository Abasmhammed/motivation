name: YouTube 24/7 Vintage Stream (FIXED - No Text)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  vintage_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download 1 Test Video (Working)
        run: |
          wget --timeout=30 --tries=3 -q -O "test.mp4" "https://archive.org/download/Technico1949/Technico1949_512kb.mp4"
          ls -lh test.mp4

      - name: 🔴 Stream to YouTube (No Text Overlay)
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          echo "🎬 Starting livestream..."
          ffmpeg -re -stream_loop -1 -i "test.mp4" \
            -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -b:v 1500k -maxrate 1500k -bufsize 3000k \
            -pix_fmt yuv420p -r 25 \
            -c:a aac -b:a 96k \
            -f flv "$RTMP_TARGET"
