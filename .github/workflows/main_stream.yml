name: Working Hockey Loop Only

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  hockey_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download PROVEN Hockey Links Only
        run: |
          # Hockey 1 - YOUR ORIGINAL WORKING
          wget -O h1.mp4 "https://archive.org/download/d51753dc-f54b-4964-a32a-5aee2a693d68/WHS%20Alumni%20Hockey%20Game%201%201994.mp4"
          
          # Hockey 2 - NYR vs TOR (proven)
          wget -O h2.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/NYR%20vs%20TOR.ia.mp4"
          
          # Hockey 3 - Stanley Cup (proven)
          wget -O h3.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/1962%20Stanley%20Cup%20Finals%20G6.mp4"

      - name: Create List
        run: |
          cat > list.txt << EOF
          file 'h1.mp4'
          file 'h2.mp4'
          file 'h3.mp4'
          EOF

      - name: Merge
        run: ffmpeg -f concat -safe 0 -i list.txt -c copy hockey_loop.mp4

      - name: Stream
        env:
          STREAM_KEY: ${{
