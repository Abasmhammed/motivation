name: Seamless Hockey Continuous Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  seamless_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg wget

      - name: Download 4 Hockey Games (PROVEN WORKING)
        run: |
          # Hockey 1 - Original working link
          wget -O hockey1.mp4 "https://archive.org/download/d51753dc-f54b-4964-a32a-5aee2a693d68/WHS%20Alumni%20Hockey%20Game%201%201994.mp4"
          
          # Hockey 2 - NYR vs TOR Classic
          wget -O hockey2.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/NYR%20vs%20TOR.ia.mp4"
          
          # Hockey 3 - Old Hockey DVDs
          wget -O hockey3.mp4 "https://archive.org/download/OldHockeyDVDs/OldHockeyDVD1.mp4"
          
          # Hockey 4 - Stanley Cup 1962
          wget -O hockey4.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/1962%20Stanley%20Cup%20Finals%20G6.mp4"

      - name: Create Concat List
        run: |
          cat > list.txt << EOF
          file 'hockey1.mp4'
          file 'hockey2.mp4'  
          file 'hockey3.mp4'
          file 'hockey4.mp4'
          EOF

      - name: Merge Videos
        run: |
          ffmpeg -f concat -safe 0 -i list.txt -c copy seamless_hockey.mp4

      - name: Infinite Hockey Loop
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -stream_loop -1 -re -i seamless_hockey.mp4 \
            -vf "scale=1280:720,fps=25,drawbox=y=0:color=black@0.85:width=iw:height=80,drawtext=text='🏒 HOCKEY MARATHON 24/7':x=50:y=15:fontsize=36:fontcolor=#FFD700:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,drawtext=text='WHS+NYRvsTOR+DVDs+StanleyCup | %{localtime\:%H\:%M} LIVE!':x=w-tw-50:y=20:fontsize=28:fontcolor=white,drawbox=y=h-80:color=#8B0000@0.8:width=iw:height=80,drawtext=text='SUBSCRIBE HOCKEY FANS!':x=(w-text_w)/2:y=h-35:fontsize=32:fontcolor=#FFD700" \
            -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3500k -bufsize 6000k -g 60 -keyint_min 60 -sc_threshold 0 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
