name: Global Cinema 24-7 - Stanley Cup Classics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  movie_streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Media Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core wget

      - name: Download Verified Hockey Game
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=10 --waitretry=15 --timeout=60 \
               -O hockey.mp4 "https://archive.org/download/1962-stanley-cup-finals-g-6_202308/TOR%20vs%20DET.ia.mp4"
          
          if [ ! -s hockey.mp4 ] || [ $(stat -c%s hockey.mp4) -lt 100000000 ]; then 
            echo "Download failed"
            ls -la hockey.mp4 || true
            exit 1
          fi
          echo "Success: $(du -h hockey.mp4)"

      - name: Verify Video
        run: |
          ffprobe -v quiet -show_entries format=duration:size -of csv=p=0 hockey.mp4 || exit 1
          echo "Video ready"

      - name: Stream to YouTube
        run: |
          RTMP_TARGET="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
          ffmpeg -re -stream_loop -1 -i hockey.mp4 \
          -filter_complex "[0:v]scale=1280:720,drawbox=y=0:color=black@0.8:width=iw:height=75,drawtext=text='STANLEY CUP 1962 CLASSICS':x=50:y=20:fontsize=35:fontcolor=red,drawtext=text='%{localtime\:%H\:%M\:%S}':x=w-tw-50:y=20:fontsize=30:fontcolor=yellow,drawbox=y=h-75:color=blue@0.7:width=iw:height=75,drawtext=text='SUBSCRIBE 24/7 HOCKEY 🏒':x=(w-tw)/2:y=h-th-20:fontsize=30:fontcolor=white[v]" \
          -map "[v]" -map 0:a -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p -r 30 -g 60 -c:a aac -f flv "$RTMP_TARGET"
