name: Global Cinema 24-7 Local Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  movie_streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install Pro Media Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core wget

      - name: Pre-Download Hockey Game
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/115.0 Safari/537.36" \
               --tries=5 --waitretry=10 \
               -O hockey.mp4 "https://archive.org/download/d51753dc-f54b-4964-a32a-5aee2a693d68/WHS%20Alumni%20Hockey%20Game%201%201994.mp4"
          ls -lh hockey.mp4

      - name: Start 24-7 Hockey Stream
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          ffmpeg -stream_loop -1 -re -i hockey.mp4 \
            -vf "scale=1280:720,fps=25,\
                 drawbox=y=0:color=black@0.8:width=iw:height=80,\
                 drawtext=text='WHS ALUMNI HOCKEY GAME 1994':x=50:y=20:fontsize=32:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,\
                 drawtext=text='%{localtime\:%Y-%m-%d %H\\:%M} LIVE':x=w-tw-50:y=20:fontsize=26:fontcolor=yellow:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf,\
                 drawbox=y=h-80:color=blue@0.7:width=iw:height=70,\
                 drawtext=text='SUBSCRIBE FOR MORE HOCKEY 🎉':x=(w-tw)/2:y=h-th-20:fontsize=30:fontcolor=white:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf" \
            -map 0:v -map 0:a \
            -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -pix_fmt yuv420p -r 25 -g 50 -keyint_min 50 -sc_threshold 0 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "$RTMP_TARGET"
