name: Beautiful Days Vintage 24/7 (Pro Fixed + Archive.org)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  vintage_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget curl

      - name: Download 12 Videos/Audio (Skip Failed)
        continue-on-error: true
        run: |
          echo "Downloading 12 vintage/archive files..."

          # Original working links
          wget --timeout=30 --tries=3 -q -O v1.mp4 "https://archive.org/download/Technico1949/Technico1949.mp4" || true
          wget --timeout=30 --tries=3 -q -O v2.mp4 "https://dn790000.ca.archive.org/0/items/MakeMine1948/MakeMine1948.mp4" || true
          wget --timeout=30 --tries=3 -q -O v3.mp4 "https://archive.org/download/1938TheTinNoseShop/1938TheTinNoseShop_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v4.mp4 "https://archive.org/download/ThatTinNoseShop1938/ThatTinNoseShop1938_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v5.mp4 "https://archive.org/download/1949publicdomainanimation/1949_512kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v6.mp4 "https://archive.org/download/1940sShortFilm/1940sShortFilm_512kb.mp4" || true

          # New Archive.org additions (Cap'n Crunch + LibriVox)
          wget --timeout=30 --tries=3 -q -O v7.mp4 "https://archive.org/download/CapnCrunchCereal1960s-70s/CapnCrunchCereal1960s-70s.mp4" || true
          wget --timeout=30 --tries=3 -q -O v8.mp4 "https://dn710702.ca.archive.org/0/items/CapnCrunchCereal1960s-70s/1965%20Cap%27n%20Crunch%27s%20Sweet%20Tooth.mp4" || true
          wget --timeout=30 --tries=3 -q -O v9.mp3 "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_00_bennett_128kb.mp3" || true
          wget --timeout=30 --tries=3 -q -O v10.mp4 "https://archive.org/download/howtoliveon24hoursaday_1504_librivox/howtoliveon24hoursaday_1504_librivox_64kb.mp4" || true
          wget --timeout=30 --tries=3 -q -O v11.mp4 "https://ia800706.us.archive.org/5/items/MakeMine1948/MakeMine1948.mp4" || true
          wget --timeout=30 --tries=3 -q -O v12.mp4 "https://archive.org/download/@vintagecartoons/1940sCartoonShort.mp4" || true

          echo "Available files:"
          ls -lh v*.mp* 2>/dev/null || echo "No files downloaded"

      - name: 24/7 Live Stream (Video + Audio Support)
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Find first valid file (video priority, then audio)
          FILE=""
          for f in v*.mp4 v*.mp3; do
            if [ -f "$f" ] && ffprobe "$f" >/dev/null 2>&1; then
              FILE="$f"
              break
            fi
          done
          
          if [ -z "$FILE" ]; then
            echo "No valid files found!"
            exit 1
          fi

          echo "Streaming: $FILE (size: $(du -h $FILE | cut -f1))"

          if [[ $FILE == *.mp3 ]]; then
            # Convert audio to video loop (black background)
            ffmpeg -stream_loop -1 -i "$FILE" -f lavfi -i color=black:size=1280x720:duration=1 -shortest \
              -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
              -c:v libx264 -preset ultrafast -tune zerolatency -b:v 1500k -maxrate 2000k -bufsize 3000k \
              -g 50 -keyint_min 25 -sc_threshold 0 -pix_fmt yuv420p \
              -c:a aac -b:a 128k -ar 44100 -ac 2 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          else
            # Video streaming
            ffmpeg -re -stream_loop -1 -i "$FILE" \
              -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 1500k -maxrate 2000k -bufsize 3000k \
              -g 50 -keyint_min 25 -sc_threshold 0 -pix_fmt yuv420p \
              -c:a aac -b:a 128k -ar 44100 -ac 2 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          fi
