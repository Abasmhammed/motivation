name: Vintage Jazz Classics - 098439 Background Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  jazz_stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Media Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core wget

      - name: Download 4 Paul Whiteman Jazz Songs
        run: |
          # الأغاني الأربع (ثابتة)
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 -O tipperary.mp3 \
               "https://dn720708.ca.archive.org/0/items/its-a-long-long-way-to-tipperary/It%27s%20a%20Long%2C%20Long%20Way%20to%20Tipperary.mp3"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 -O dancing.mp3 \
               "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/ABoyAndAGirlWereDancing.mp3"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 -O twilight.mp3 \
               "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AtTwilight.mp3"
          
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               --tries=5 -O happiness.mp3 \
               "https://dn721501.ca.archive.org/0/items/PaulWhiteman1920-1935CompleteCollection/AllForYou-Happiness.mp3"

      - name: Download 098439 Jazz Background (Auto-detect Best Video)
        run: |
          # يحاول تحميل أفضل فيديو متاح من 098439 تلقائياً
          # يجرب H.264 أولاً ثم OGG VIDEO
          wget --user-agent="Mozilla/5.0" --tries=3 -O jazz_bg.mp4 \
            "https://archive.org/download/098439/098439.mp4" || \
          wget --user-agent="Mozilla/5.0" --tries=3 -O jazz_bg.mp4 \
            "https://archive.org/download/098439/098439.ogv" || \
          wget --user-agent="Mozilla/5.0" --tries=3 -O jazz_bg.mp4 \
            "https://archive.org/download/098439/098439.m4v"
          
          # تحويل لـ MP4 إذا لزم الأمر
          ffmpeg -i jazz_bg.mp4 -c copy -movflags +faststart jazz_bg_final.mp4
          mv jazz_bg_final.mp4 jazz_bg.mp4
          ls -lh jazz_bg.mp4

      - name: Create 4 Jazz Videos with 098439 Background
        run: |
          # كل أغنية + خلفية 098439 = فيديو منفصل
          for song in tipperary dancing twilight happiness; do
            ffmpeg -stream_loop -1 -i jazz_bg.mp4 \
                   -i ${song}.mp3 \
                   -c:v libx264 -preset ultrafast -b:v 2000k \
                   -pix_fmt yuv420p \
                   -c:a aac -b:a 128k \
                   -shortest \
                   ${song}_video.mp4
          done
          ls -lh *_video.mp4

      - name: 24/7 Quad Jazz Seamless Loop → YouTube Live
        env:
          RTMP_TARGET: "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
        run: |
          # قائمة التشغيل: 4 أغاني مع خلفية 098439
          echo "file 'tipperary_video.mp4'" > jazz_playlist.txt
          echo "file 'dancing_video.mp4'" >> jazz_playlist.txt
          echo "file 'twilight_video.mp4'" >> jazz_playlist.txt
          echo "file 'happiness_video.mp4'" >> jazz_playlist.txt

          # بث لووب لا نهائي
          ffmpeg -stream_loop -1 -f concat -safe 0 -i jazz_playlist.txt \
            -c:v libx264 -preset ultrafast -b:v 2000k -maxrate 2000k \
            -pix_fmt yuv420p -r 25 \
            -c:a aac -b:a 128k \
            -f flv "$RTMP_TARGET"
